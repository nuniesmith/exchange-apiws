# Dependabot — weekly dependency + GitHub Actions updates.
# Minor/patch bumps are grouped into one PR to keep the noise down; major bumps
# come as individual PRs so breaking changes are reviewed on their own.
version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # dtolnay/rust-toolchain's ref is a *Rust toolchain version*, not the
      # action's own version. The msrv job pins it to the crate's declared
      # `rust-version` on purpose; auto-bumping it (#54 → 1.100.0) both breaks
      # the job (no such toolchain) and defeats the MSRV check. Pin is managed
      # by hand. The other jobs use `@stable`, which is unaffected.
      - dependency-name: "dtolnay/rust-toolchain"
