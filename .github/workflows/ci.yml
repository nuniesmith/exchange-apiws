name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  deny:
    name: cargo deny (advisories / licenses / bans / sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-deny --locked
      # Supply-chain check (config: deny.toml). Non-blocking for now; drop
      # continue-on-error to gate once the graph stays clean.
      - run: cargo deny check
        continue-on-error: true

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # All exchanges enabled — the surface most users build.
      - name: clippy (all features)
        run: cargo clippy --all-targets --all-features -- -D warnings
      # KuCoin-only — proves the feature gates don't leave dead code or
      # broken cfg behind when the optional exchanges are disabled.
      - name: clippy (no default features)
        run: cargo clippy --all-targets --no-default-features -- -D warnings

  test:
    name: test (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: default
            flags: ""
          - label: all-features
            flags: "--all-features"
          - label: no-default-features
            flags: "--no-default-features"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Tests are fully offline (wiremock + local tokio-tungstenite servers),
      # so no network or secrets are required.
      - run: cargo test ${{ matrix.flags }} --verbose

  docs:
    name: doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Deny rustdoc warnings so broken intra-doc links can't reach docs.rs.
      - run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  msrv:
    name: msrv (1.94.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # MUST match the crate's declared `rust-version` in Cargo.toml — this job
      # exists to prove the crate still builds on its MSRV. Do NOT bump to
      # "latest"; that defeats the check. Dependabot is told to ignore this
      # action (see .github/dependabot.yml) so it can't auto-bump the pin.
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
      # Verify the crate still builds on the declared rust-version.
      - run: cargo check --all-features --all-targets
